name: Site Build + Verifier Contract

on:
  pull_request:
    branches: [main]
    paths:
      - "**.html"
      - "assets/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - "release.json"
      - ".github/workflows/site-ci.yml"
  push:
    branches: [main]
    paths:
      - "**.html"
      - "assets/**"
      - "src/**"
      - "tests/**"
      - "package.json"
      - "package-lock.json"
      - "release.json"
      - ".github/workflows/site-ci.yml"

permissions:
  contents: read

concurrency:
  group: site-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run build
      - name: Require committed build output to be current
        run: git diff --exit-code
      - run: npx playwright install --with-deps chromium
      - run: npm run test:verify

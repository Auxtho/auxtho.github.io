name: Site Build + Verifier Contract

# RELEASE HOLD: the live Pages project still uses legacy branch publishing.
# Branch-based publishing bypasses this workflow, so this workflow cannot
# authorize a release until Pages reports build_type=workflow. Merely naming
# the github-pages environment is not evidence of approval. Packaging and
# deployment remain manual-only and also require future platform controls:
# required reviewers, self-review prevention, and exact-SHA release variables.
on:
  workflow_dispatch:
    inputs:
      approved_sha:
        description: Exact 40-character site commit reviewed for release
        required: true
        type: string
      compatible_backend_site_shas:
        description: JSON array of one or two reviewed site SHAs emitted by the old/new backend revisions
        required: true
        type: string
  pull_request:
    branches: [main]
    paths:
      - "**.html"
      - "assets/**"
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "CNAME"
      - "robots.txt"
      - "sitemap.xml"
      - "_config.yml"
      - "tailwind.config.js"
      - "package.json"
      - "package-lock.json"
      - "release.json"
      - ".gitattributes"
      - ".github/workflows/site-ci.yml"
  push:
    branches: [main]
    paths:
      - "**.html"
      - "assets/**"
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "CNAME"
      - "robots.txt"
      - "sitemap.xml"
      - "_config.yml"
      - "tailwind.config.js"
      - "package.json"
      - "package-lock.json"
      - "release.json"
      - ".gitattributes"
      - ".github/workflows/site-ci.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && 'pages-release' || format('site-ci-{0}', github.ref) }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  verify:
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    permissions:
      contents: read
      pages: read
    env:
      SOURCE_SHA: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
    steps:
      - name: Check out the exact workflow source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event_name == 'pull_request' && github.event.pull_request.head.sha || github.sha }}
          persist-credentials: false
      - name: Require main for a manual Pages release
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: exit 1
      - name: Bind the checkout to the workflow SHA
        run: test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.17.0
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run build
      - name: Require committed generated CSS to be tracked and current
        run: |
          git ls-files --error-unmatch -- assets/style.css
          git diff --exit-code
      - run: npm run test:release
      - run: ./node_modules/.bin/playwright install --with-deps chromium
      - run: npm run test:verify

  authorize_release:
    name: HOLD Unless Future Platform Controls Authorize Exact SHA
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-24.04
    timeout-minutes: 5
    permissions:
      actions: read
      contents: read
      deployments: read
      pages: read
    environment:
      name: github-pages
    env:
      REQUESTED_SITE_SHA: ${{ inputs.approved_sha }}
      APPROVED_SITE_SHA: ${{ vars.PRODUCTION_VERIFY_SITE_APPROVED_SHA }}
      REQUESTED_COMPATIBLE_BACKEND_SITE_SHAS: ${{ inputs.compatible_backend_site_shas }}
      APPROVED_COMPATIBLE_BACKEND_SITE_SHAS: ${{ vars.PRODUCTION_VERIFY_COMPATIBLE_BACKEND_SITE_SHAS }}
    steps:
      - name: Bind dispatch input, protected variables, and workflow source
        run: |
          echo "${REQUESTED_SITE_SHA}" | grep -Eq '^[0-9a-f]{40}$'
          echo "${APPROVED_SITE_SHA}" | grep -Eq '^[0-9a-f]{40}$'
          test "${GITHUB_SHA}" = "${REQUESTED_SITE_SHA}"
          test "${REQUESTED_SITE_SHA}" = "${APPROVED_SITE_SHA}"
          node - <<'NODE'
          const SHA = /^[0-9a-f]{40}$/;
          function parseAndValidate(name, value) {
            let parsed;
            try { parsed = JSON.parse(value); } catch { throw new Error(`${name} must be valid JSON`); }
            if (!Array.isArray(parsed) || parsed.length < 1 || parsed.length > 2) {
              throw new Error(`${name} must contain one or two reviewed site SHAs`);
            }
            if (parsed.some((sha) => typeof sha !== 'string' || !SHA.test(sha))) {
              throw new Error(`${name} entries must be exact lowercase 40-character SHAs`);
            }
            if (new Set(parsed).size !== parsed.length) throw new Error(`${name} must not contain duplicates`);
            if (!parsed.includes(process.env.GITHUB_SHA)) throw new Error(`${name} must include the release source SHA`);
            return parsed;
          }
          const requested = parseAndValidate('requested compatible_backend_site_shas', process.env.REQUESTED_COMPATIBLE_BACKEND_SITE_SHAS);
          const approved = parseAndValidate('environment compatible_backend_site_shas', process.env.APPROVED_COMPATIBLE_BACKEND_SITE_SHAS);
          if (JSON.stringify(requested) !== JSON.stringify(approved)) {
            throw new Error('requested compatible_backend_site_shas does not exactly match the protected environment allowlist');
          }
          NODE
      - name: Require future Pages and protected-environment controls
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -Eeuo pipefail
          pages_build_type="$(gh api "repos/$GITHUB_REPOSITORY/pages" --jq '.build_type')"
          echo "pages-build-type=$pages_build_type"
          if test "$pages_build_type" != "workflow"; then
            echo "::error::HOLD: Pages publishing source is legacy; a separately approved future platform change is still required."
            exit 1
          fi
          gh api "repos/$GITHUB_REPOSITORY/environments/github-pages" > /tmp/github-pages-environment.json
          node - <<'NODE'
          const fs = require('node:fs');
          const environment = JSON.parse(fs.readFileSync('/tmp/github-pages-environment.json', 'utf8'));
          const rules = Array.isArray(environment.protection_rules) ? environment.protection_rules : [];
          const reviewerRule = rules.find((rule) => rule && rule.type === 'required_reviewers');
          if (environment.can_admins_bypass !== false) {
            throw new Error('HOLD: github-pages must disable administrator bypass');
          }
          if (!reviewerRule || !Array.isArray(reviewerRule.reviewers) || reviewerRule.reviewers.length < 1) {
            throw new Error('HOLD: github-pages must have at least one platform-enforced required reviewer');
          }
          if (reviewerRule.prevent_self_review !== true && environment.prevent_self_review !== true) {
            throw new Error('HOLD: github-pages must prevent self-review');
          }
          console.log('administrator-bypass=false');
          console.log(`required-reviewers=${reviewerRule.reviewers.length}`);
          console.log('prevent-self-review=true');
          NODE

  package:
    name: Package Exact Committed Pages Bytes
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    needs: [verify, authorize_release]
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    env:
      SOURCE_SHA: ${{ github.sha }}
      COMPATIBLE_BACKEND_SITE_SHAS: ${{ inputs.compatible_backend_site_shas }}
    steps:
      - name: Check out the exact package source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Set up exact Node runtime for release identity validation
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.17.0
      - name: Stage only explicit public paths from exact committed bytes
        run: |
          set -Eeuo pipefail
          test "$(git rev-parse HEAD)" = "${SOURCE_SHA}"
          test -z "$(git status --porcelain=v1 --untracked-files=all)"
          git ls-files -z | \
            git check-attr --stdin -z export-ignore export-subst > /tmp/site-export-attrs
          node - <<'NODE'
          const fs = require('node:fs');
          const parts = fs.readFileSync('/tmp/site-export-attrs').toString('utf8').split('\0').filter(Boolean);
          if (parts.length % 3 !== 0) throw new Error('invalid git check-attr output');
          const invalid = [];
          for (let index = 0; index < parts.length; index += 3) {
            if (!['unspecified', 'unset'].includes(parts[index + 2])) {
              invalid.push(parts.slice(index, index + 3));
            }
          }
          if (invalid.length) throw new Error(`archive export attributes are forbidden: ${JSON.stringify(invalid)}`);
          NODE
          mkdir -p _release_source _site
          git archive --format=tar "${SOURCE_SHA}" | tar -xf - -C _release_source
          find _release_source -type l -print -quit | grep -q . && exit 1 || true
          test -d _release_source/assets
          if test -e _release_source/assets/ld-org.json; then
            echo "HOLD: assets/ld-org.json is retired while the legal entity is unresolved" >&2
            exit 1
          fi
          while IFS= read -r -d '' asset; do
            case "${asset}" in
              *.css|*.js|*.json|*.png|*.svg) ;;
              *) echo "HOLD: unreviewed public asset type: ${asset}" >&2; exit 1 ;;
            esac
          done < <(find _release_source/assets -type f -print0)
          find _release_source -maxdepth 1 -type f -name '*.html' -exec cp --preserve=mode,timestamps '{}' _site/ ';'
          for path in CNAME robots.txt sitemap.xml; do
            test -f "_release_source/${path}"
            cp --preserve=mode,timestamps "_release_source/${path}" "_site/${path}"
          done
          for path in security/ardamire/index.html; do
            test -f "_release_source/${path}"
            mkdir -p "_site/$(dirname "${path}")"
            cp --preserve=mode,timestamps "_release_source/${path}" "_site/${path}"
          done
          cp -a _release_source/assets _site/assets
          node - <<'NODE'
          const fs = require('node:fs');
          const compatible = JSON.parse(process.env.COMPATIBLE_BACKEND_SITE_SHAS);
          fs.writeFileSync(
            '_site/release.json',
            `${JSON.stringify({ source_sha: process.env.SOURCE_SHA, compatible_backend_site_shas: compatible })}\n`,
          );
          NODE
          test -z "$(find _site -type l -print -quit)"
          test "$(find _site -maxdepth 1 -type f -name '*.html' | wc -l)" -gt 0
          EXPECTED_FILE_COUNT=$((
            $(find _release_source -maxdepth 1 -type f -name '*.html' | wc -l) +
            $(find _release_source/assets -type f | wc -l) +
            5
          ))
          test "$(find _site -type f | wc -l)" -eq "${EXPECTED_FILE_COUNT}"
      - name: Verify every packaged committed byte and generated release identity
        run: |
          set -Eeuo pipefail
          diff -qr _release_source/assets _site/assets
          for path in _site/*.html _site/security/ardamire/index.html _site/CNAME _site/robots.txt _site/sitemap.xml; do
            relative="${path#_site/}"
            cmp "_release_source/${relative}" "${path}"
          done
          node - <<'NODE'
          const fs = require('node:fs');
          const SHA = /^[0-9a-f]{40}$/;
          const payload = JSON.parse(fs.readFileSync('_site/release.json', 'utf8'));
          const keys = Object.keys(payload);
          if (keys.length !== 2 || keys[0] !== 'source_sha' || keys[1] !== 'compatible_backend_site_shas') {
            throw new Error('release metadata must contain only source_sha and compatible_backend_site_shas');
          }
          if (payload.source_sha !== process.env.SOURCE_SHA) throw new Error('release source_sha mismatch');
          const compatible = payload.compatible_backend_site_shas;
          if (!Array.isArray(compatible) || compatible.length < 1 || compatible.length > 2) {
            throw new Error('compatible_backend_site_shas must contain one or two reviewed SHAs');
          }
          if (compatible.some((sha) => typeof sha !== 'string' || !SHA.test(sha))) {
            throw new Error('compatible_backend_site_shas contains an invalid SHA');
          }
          if (new Set(compatible).size !== compatible.length) throw new Error('compatible_backend_site_shas contains duplicates');
          if (!compatible.includes(payload.source_sha)) throw new Error('compatible_backend_site_shas must include source_sha');
          NODE
          mkdir -p site-release-provenance
          (
            cd _site
            find . -type f -print0 | sort -z | xargs -0 sha256sum
          ) > site-release-provenance/public-files-sha256.txt
          node - <<'NODE'
          const fs = require('node:fs');
          const digestLines = fs.readFileSync('site-release-provenance/public-files-sha256.txt', 'utf8')
            .trim()
            .split('\n')
            .filter(Boolean);
          if (digestLines.length < 1 || digestLines.length > 1024) {
            throw new Error('public file attestation subject count must be between 1 and 1024');
          }
          const provenance = {
            schema_version: 1,
            source_sha: process.env.SOURCE_SHA,
            compatible_backend_site_shas: JSON.parse(process.env.COMPATIBLE_BACKEND_SITE_SHAS),
            repository: process.env.GITHUB_REPOSITORY,
            workflow_run_id: process.env.GITHUB_RUN_ID,
            workflow_run_attempt: Number(process.env.GITHUB_RUN_ATTEMPT),
            digest_algorithm: 'sha256',
            digest_manifest: 'public-files-sha256.txt',
            public_file_count: digestLines.length,
          };
          fs.writeFileSync('site-release-provenance/provenance.json', `${JSON.stringify(provenance, null, 2)}\n`);
          NODE
          cat site-release-provenance/public-files-sha256.txt
          cat site-release-provenance/provenance.json
      - name: Retain public file digests and release provenance
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: site-public-file-provenance-${{ github.sha }}
          path: site-release-provenance
          if-no-files-found: error
          retention-days: 90
          compression-level: 0
      - name: Create durable signed provenance for every packaged public file
        id: attest-public-files
        uses: actions/attest@f7c74d28b9d84cb8768d0b8ca14a4bac6ef463e6 # v4.2.0
        with:
          subject-checksums: site-release-provenance/public-files-sha256.txt
        # Failure is a release HOLD. This requires GitHub artifact attestations
        # plus id-token, attestations, and artifact-metadata write permissions;
        # the signed record is not limited to the 90-day workflow artifact.
      - name: Upload the verified Pages artifact
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: ./_site
          retention-days: 1

  deploy:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    needs: package
    runs-on: ubuntu-24.04
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy the verified exact-SHA artifact
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  post_deploy_verify:
    name: Read Back Release And Smoke Verifier
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    needs: deploy
    runs-on: ubuntu-24.04
    timeout-minutes: 8
    permissions:
      contents: read
    env:
      DEPLOYMENT_PAGE_URL: ${{ needs.deploy.outputs.page_url }}
      PUBLIC_SITE_ORIGIN: https://auxtho.com
      EXPECTED_PAGES_DEPLOYMENT_ORIGINS: '["https://auxtho.com","https://auxtho.github.io"]'
      EXPECTED_SITE_SHA: ${{ github.sha }}
      EXPECTED_COMPATIBLE_BACKEND_SITE_SHAS: ${{ inputs.compatible_backend_site_shas }}
    steps:
      - name: Check out the exact deployed source for the bounded smoke
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22.17.0
          cache: npm
      - run: npm ci
      - name: Download the exact package digest manifest from this release run
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: site-public-file-provenance-${{ github.sha }}
          path: site-release-provenance
      - name: Cache-busted exact-SHA and compatibility readback
        run: |
          set -Eeuo pipefail
          node - <<'NODE'
          const allowed = JSON.parse(process.env.EXPECTED_PAGES_DEPLOYMENT_ORIGINS);
          const deployment = new URL(process.env.DEPLOYMENT_PAGE_URL);
          if (deployment.protocol !== 'https:' || !allowed.includes(deployment.origin)) {
            throw new Error('HOLD: Pages deployment URL is not an exact reviewed HTTPS origin');
          }
          NODE
          case "${PUBLIC_SITE_ORIGIN}" in
            https://*) ;;
            *) echo "HOLD: public readback origin must use HTTPS" >&2; exit 1 ;;
          esac
          mkdir -p post-deploy-evidence
          readback_confirmed=false
          for attempt in 1 2 3 4 5 6; do
            cache_bust="${EXPECTED_SITE_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-${attempt}"
            readback_url="${PUBLIC_SITE_ORIGIN}/release.json?cache_bust=${cache_bust}"
            printf '%s\n' "${readback_url}" > post-deploy-evidence/release-readback-url.txt
            if curl --fail --silent --show-error --proto '=https' --tlsv1.2 \
              --connect-timeout 10 --max-time 30 --max-redirs 0 \
              --dump-header post-deploy-evidence/release-response-headers.txt \
              --output post-deploy-evidence/deployed-release.json \
              "${readback_url}" && node - <<'NODE'
          const fs = require('node:fs');
          const SHA = /^[0-9a-f]{40}$/;
          const deployed = JSON.parse(fs.readFileSync('post-deploy-evidence/deployed-release.json', 'utf8'));
          const expectedCompatible = JSON.parse(process.env.EXPECTED_COMPATIBLE_BACKEND_SITE_SHAS);
          if (!SHA.test(process.env.EXPECTED_SITE_SHA)) throw new Error('expected source SHA is invalid');
          if (JSON.stringify(Object.keys(deployed)) !== JSON.stringify(['source_sha', 'compatible_backend_site_shas'])) {
            throw new Error('deployed release metadata keys are not exact');
          }
          if (deployed.source_sha !== process.env.EXPECTED_SITE_SHA) throw new Error('deployed source SHA mismatch');
          if (JSON.stringify(deployed.compatible_backend_site_shas) !== JSON.stringify(expectedCompatible)) {
            throw new Error('deployed compatibility allowlist mismatch');
          }
          if (!deployed.compatible_backend_site_shas.includes(deployed.source_sha)) {
            throw new Error('deployed compatibility allowlist does not include the source SHA');
          }
          NODE
            then
              readback_confirmed=true
              break
            fi
            if test "${attempt}" -eq 6; then
              echo "HOLD: deployed release identity was not confirmed after six bounded attempts" >&2
              exit 1
            fi
            sleep 10
          done
          test "${readback_confirmed}" = true
      - name: Read back and hash every deployed public HTML, JavaScript, and release byte
        run: |
          set -Eeuo pipefail
          test -s site-release-provenance/public-files-sha256.txt
          test -s site-release-provenance/provenance.json
          mkdir -p post-deploy-evidence/public-readback
          node - <<'NODE'
          const fs = require('node:fs');
          const path = require('node:path');
          const provenance = JSON.parse(fs.readFileSync('site-release-provenance/provenance.json', 'utf8'));
          if (provenance.source_sha !== process.env.EXPECTED_SITE_SHA) {
            throw new Error('package provenance source SHA mismatch');
          }
          if (provenance.repository !== process.env.GITHUB_REPOSITORY) {
            throw new Error('package provenance repository mismatch');
          }
          if (String(provenance.workflow_run_id) !== process.env.GITHUB_RUN_ID) {
            throw new Error('package provenance workflow run mismatch');
          }
          if (Number(provenance.workflow_run_attempt) !== Number(process.env.GITHUB_RUN_ATTEMPT)) {
            throw new Error('package provenance workflow attempt mismatch');
          }
          const entries = fs.readFileSync('site-release-provenance/public-files-sha256.txt', 'utf8')
            .trim()
            .split(/\r?\n/)
            .filter(Boolean)
            .map((line) => {
              const match = line.match(/^([0-9a-f]{64})  \.\/(.+)$/);
              if (!match) throw new Error(`invalid package digest line: ${line}`);
              const relative = match[2];
              if (!/^[A-Za-z0-9._/-]+$/.test(relative) || relative.includes('..') || path.posix.isAbsolute(relative)) {
                throw new Error(`unsafe public path in package digest: ${relative}`);
              }
              return { sha256: match[1], relative };
            });
          if (entries.length !== provenance.public_file_count) {
            throw new Error('package provenance file count mismatch');
          }
          const critical = entries.filter(({ relative }) => (
            relative.endsWith('.html') || relative.endsWith('.js') || relative === 'release.json'
          ));
          const required = [
            'index.html',
            'verify.html',
            'privacy.html',
            'story.html',
            'security/ardamire/index.html',
            'assets/verify-2026-04-24b.js',
            'release.json',
          ];
          const found = new Set(critical.map(({ relative }) => relative));
          for (const relative of required) {
            if (!found.has(relative)) throw new Error(`critical public file is absent from package digest: ${relative}`);
          }
          fs.writeFileSync(
            'post-deploy-evidence/critical-public-files.tsv',
            `${critical.map(({ sha256, relative }) => `${sha256}\t${relative}`).join('\n')}\n`,
          );
          NODE
          while IFS=$'\t' read -r expected_sha relative_path; do
            test -n "${expected_sha}"
            test -n "${relative_path}"
            output_path="post-deploy-evidence/public-readback/${relative_path}"
            mkdir -p "$(dirname "${output_path}")"
            cache_bust="${EXPECTED_SITE_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-bytes"
            curl --fail --silent --show-error --proto '=https' --tlsv1.2 \
              --connect-timeout 10 --max-time 30 --max-redirs 0 \
              --header 'Accept-Encoding: identity' \
              --output "${output_path}" \
              "${PUBLIC_SITE_ORIGIN}/${relative_path}?cache_bust=${cache_bust}"
            actual_sha="$(sha256sum "${output_path}" | cut -d' ' -f1)"
            if test "${actual_sha}" != "${expected_sha}"; then
              echo "HOLD: deployed public byte mismatch for ${relative_path}" >&2
              exit 1
            fi
          done < post-deploy-evidence/critical-public-files.tsv
          ld_org_status="$(curl --silent --show-error --proto '=https' --tlsv1.2 \
            --connect-timeout 10 --max-time 30 --max-redirs 0 \
            --header 'Accept-Encoding: identity' \
            --output post-deploy-evidence/retired-ld-org-response.txt \
            --write-out '%{http_code}' \
            "${PUBLIC_SITE_ORIGIN}/assets/ld-org.json?cache_bust=${EXPECTED_SITE_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}-retired")"
          case "${ld_org_status}" in
            404|410) ;;
            *) echo "HOLD: retired assets/ld-org.json is still publicly retrievable (HTTP ${ld_org_status})" >&2; exit 1 ;;
          esac
      - name: Verify Cloudflare HTTPS and security response headers
        run: |
          set -Eeuo pipefail
          cache_bust="${EXPECTED_SITE_SHA}-${GITHUB_RUN_ID}-${GITHUB_RUN_ATTEMPT}"
          curl --fail --silent --show-error --proto '=https' --tlsv1.2 \
            --connect-timeout 10 --max-time 30 --max-redirs 0 \
            --dump-header post-deploy-evidence/verifier-response-headers.txt \
            --output post-deploy-evidence/verifier-response.html \
            "${PUBLIC_SITE_ORIGIN}/verify.html?cache_bust=${cache_bust}"
          node - <<'NODE'
          const fs = require('node:fs');
          const raw = fs.readFileSync('post-deploy-evidence/verifier-response-headers.txt', 'utf8').replace(/\r\n/g, '\n');
          const blocks = raw.trim().split(/\n\n+/).filter(Boolean);
          const responseBlock = [...blocks].reverse().find((block) => /^HTTP\/\S+\s+200\b/m.test(block));
          if (!responseBlock) throw new Error('public verifier did not return a final HTTP 200 response');
          const headers = new Map();
          for (const line of responseBlock.split('\n').slice(1)) {
            const separator = line.indexOf(':');
            if (separator < 1) continue;
            const name = line.slice(0, separator).trim().toLowerCase();
            const value = line.slice(separator + 1).trim();
            headers.set(name, headers.has(name) ? `${headers.get(name)}, ${value}` : value);
          }
          function requireHeader(name, pattern) {
            const value = headers.get(name);
            if (!value || !pattern.test(value)) throw new Error(`required ${name} response header is missing or invalid`);
          }
          requireHeader('cf-ray', /\S+/);
          requireHeader('server', /cloudflare/i);
          requireHeader('content-type', /^text\/html\b/i);
          requireHeader('strict-transport-security', /(?:^|;)\s*max-age=\d+/i);
          requireHeader('x-content-type-options', /^nosniff$/i);
          requireHeader('referrer-policy', /\S+/);
          requireHeader('content-security-policy', /(?:^|;)\s*frame-ancestors\s+'none'\s*(?:;|$)/i);
          NODE
      - run: ./node_modules/.bin/playwright install --with-deps chromium
      - name: Run bounded read-only verifier browser smoke after deploy
        run: npm run test:verify:deployed
      - name: Retain post-deploy readback evidence
        if: always()
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: site-post-deploy-readback-${{ github.sha }}
          path: post-deploy-evidence
          if-no-files-found: warn
          retention-days: 90
          compression-level: 0

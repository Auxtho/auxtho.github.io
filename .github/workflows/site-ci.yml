name: Site Build + Verifier Contract

# Pages must use GitHub Actions as its publishing source. Branch-based publishing
# bypasses this workflow. Without protected refs/environment approvals, this is
# integrity evidence and a fail-closed build path, not an authorization boundary.
on:
  workflow_dispatch:
  pull_request:
    branches: [main]
    paths:
      - "**.html"
      - "assets/**"
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "CNAME"
      - "robots.txt"
      - "sitemap.xml"
      - "_config.yml"
      - "tailwind.config.js"
      - "package.json"
      - "package-lock.json"
      - "release.json"
      - ".github/workflows/site-ci.yml"
  push:
    branches: [main]
    paths:
      - "**.html"
      - "assets/**"
      - "src/**"
      - "scripts/**"
      - "tests/**"
      - "CNAME"
      - "robots.txt"
      - "sitemap.xml"
      - "_config.yml"
      - "tailwind.config.js"
      - "package.json"
      - "package-lock.json"
      - "release.json"
      - ".github/workflows/site-ci.yml"

permissions:
  contents: read

concurrency:
  group: ${{ github.event_name == 'workflow_dispatch' && 'pages-release' || format('site-ci-{0}', github.ref) }}
  cancel-in-progress: ${{ github.event_name != 'workflow_dispatch' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    permissions:
      contents: read
      pages: read
    env:
      SOURCE_SHA: ${{ github.sha }}
    steps:
      - name: Check out the exact workflow source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          persist-credentials: false
      - name: Require main for a manual Pages release
        if: github.event_name == 'workflow_dispatch' && github.ref != 'refs/heads/main'
        run: exit 1
      - name: Bind a manual Pages release to the explicitly approved SHA
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        env:
          APPROVED_SITE_SHA: ${{ vars.PRODUCTION_VERIFY_SITE_APPROVED_SHA }}
        run: |
          echo "${APPROVED_SITE_SHA}" | grep -Eq '^[0-9a-f]{40}$'
          test "${GITHUB_SHA}" = "${APPROVED_SITE_SHA}"
      - name: Require GitHub Actions as the Pages publishing source
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          pages_build_type="$(gh api "repos/$GITHUB_REPOSITORY/pages" --jq '.build_type')"
          echo "pages-build-type=$pages_build_type"
          test "$pages_build_type" = "workflow"
      - name: Bind the checkout to the workflow SHA
        run: test "$(git rev-parse HEAD)" = "$SOURCE_SHA"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm audit --audit-level=high
      - run: npm run build
      - name: Require committed generated CSS to be tracked and current
        run: |
          git ls-files --error-unmatch -- assets/style.css
          git diff --exit-code
      - run: npm run test:release
      - run: npx playwright install --with-deps chromium
      - run: npm run test:verify
      - name: Build exact-SHA GitHub Pages output
        uses: actions/jekyll-build-pages@44a6e6beabd48582f863aeeb6cb2151cc1716697 # v1
        with:
          source: ./
          destination: ./_site
          build_revision: ${{ github.sha }}
      - name: Verify generated Pages release identity
        run: node scripts/verify-release-contract.cjs _site/release.json "$SOURCE_SHA"
      - name: Upload the verified Pages artifact
        if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
        uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: ./_site
          retention-days: 1

  deploy:
    if: github.event_name == 'workflow_dispatch' && github.ref == 'refs/heads/main'
    needs: verify
    runs-on: ubuntu-latest
    timeout-minutes: 10
    permissions:
      contents: read
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy the verified exact-SHA artifact
        id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
